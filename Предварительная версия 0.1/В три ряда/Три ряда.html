<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON MATCH-3 // 2030</title>
    <style>
        /* ========== КИБЕРПАНК 2030 (без изменений) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0a0f1f, #010105);
            font-family: 'Inter', 'Segoe UI', 'Rajdhani', system-ui, -apple-system, 'Orbitron', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 1px, transparent 1px, transparent 80px),
                repeating-linear-gradient(0deg, rgba(255, 0, 255, 0.02) 0px, rgba(255, 0, 255, 0.02) 1px, transparent 1px, transparent 80px);
            pointer-events: none;
            z-index: 0;
        }
        .main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 8, 18, 0.92);
            backdrop-filter: blur(24px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: cyberFade 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .menu-card {
            background: rgba(12, 20, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 72px;
            padding: 40px 32px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 90%;
            max-width: 520px;
            transition: 0.2s;
        }
        .menu-card h1 {
            font-size: 3.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0ff, #f0f, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-family: 'Orbitron', monospace;
        }
        .menu-card button {
            width: 100%;
            margin: 14px 0;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(95deg, #0a1a2a, #021020);
            border: 1.5px solid #0ff;
            border-radius: 60px;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #004466, inset 0 1px 0 rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }
        .menu-card button:active { transform: translateY(3px); box-shadow: 0 2px 0 #004466; }
        .menu-card button:hover {
            background: linear-gradient(95deg, #0f2a40, #03182a);
            border-color: #f0f;
            box-shadow: 0 0 18px #0ff;
            color: #fff;
            text-shadow: 0 0 6px cyan;
        }
        .mode-select {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            animation: glitchFade 0.3s;
        }
        .mode-card {
            background: rgba(8, 16, 28, 0.95);
            border-radius: 64px;
            padding: 36px 28px;
            text-align: center;
            border: 1px solid #f0f;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
            width: 90%;
            max-width: 400px;
        }
        .mode-card h2 {
            color: #ff66ff;
            font-size: 2rem;
            margin-bottom: 24px;
            text-shadow: 0 0 8px magenta;
        }
        .mode-card button {
            width: 100%;
            margin: 12px 0;
            padding: 14px;
            font-size: 1.2rem;
            background: #0a0f1a;
            border: 1px solid cyan;
            border-radius: 50px;
            color: cyan;
            font-weight: bold;
            transition: 0.1s;
            cursor: pointer;
        }
        .mode-card button:active { transform: scale(0.98); }
        .game-container {
            display: none;
            background: rgba(6, 12, 24, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 24px 20px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,255,255,0.1);
            text-align: center;
            max-width: 720px;
            width: 100%;
            transition: 0.3s;
            position: relative;
        }
        .game-container.visible { display: block; animation: slideNeon 0.4s ease; }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 2px rgba(0,255,255,0.6), 0 20px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            background: #0e1a2a;
            width: 100%;
            height: auto;
            touch-action: none;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 22px;
            gap: 12px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 10px 22px;
            flex-wrap: wrap;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }
        .score-box, .coins-box, .goal-box {
            background: rgba(0, 20, 40, 0.7);
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-family: 'Rajdhani', monospace;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            border-left: 3px solid cyan;
            color: #bbf0ff;
        }
        .score-box span, .coins-box span {
            font-size: 1.7rem;
            font-weight: 800;
            color: #0ff;
            margin-left: 8px;
            text-shadow: 0 0 6px cyan;
        }
        .goal-box { background: #2a2a4a; border-left-color: #ff66ff; }
        button {
            background: linear-gradient(145deg, #0a1428, #010a18);
            border: 1px solid #0ff;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: cyan;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #003344;
            min-height: 44px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #003344; }
        button:hover {
            background: #0f2a44;
            border-color: #f0f;
            color: white;
            box-shadow: 0 0 12px cyan;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(24px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(8, 16, 28, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            padding: 28px 24px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid cyan;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            font-size: 2rem;
            background: linear-gradient(45deg, cyan, magenta);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .shop-item, .setting-item, .field-select {
            background: rgba(0, 20, 40, 0.6);
            border-radius: 60px;
            padding: 12px 18px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            color: #bbf0ff;
            border: 1px solid cyan;
        }
        .shop-item button, .setting-item button {
            background: #011c2c;
            border: 1px solid #0ff;
            box-shadow: 0 2px 0 #004466;
            padding: 6px 18px;
        }
        .field-select select {
            background: #0a1428;
            border: 1px solid cyan;
            border-radius: 40px;
            padding: 8px 16px;
            color: cyan;
            font-weight: bold;
        }
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 18px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 15px;
        }
        .asset-item {
            background: #001a2a;
            border-radius: 32px;
            padding: 10px;
            text-align: center;
        }
        .asset-item label { font-size: 0.8rem; display: block; margin-bottom: 6px; color: cyan; }
        input[type="file"] {
            background: #0a0f1a;
            color: cyan;
            border: 1px solid cyan;
            border-radius: 30px;
            padding: 6px;
            width: 100%;
            font-size: 10px;
        }
        .close-modal {
            margin-top: 25px;
            background: #0a1428;
            border: 1px solid magenta;
            color: magenta;
            padding: 10px 28px;
            border-radius: 60px;
        }
        .copyright {
            margin-top: 18px;
            font-size: 11px;
            color: #88aaff;
            text-align: center;
        }
        .fps-counter {
            position: fixed;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: #0ff;
            border: 1px solid cyan;
            z-index: 1200;
            pointer-events: none;
            display: none;
        }
        .fps-counter.visible { display: block; }
        @keyframes cyberFade {
            0% { opacity: 0; backdrop-filter: blur(0px); transform: scale(0.96);}
            100% { opacity: 1; backdrop-filter: blur(24px); transform: scale(1);}
        }
        @keyframes slideNeon {
            from { opacity: 0; transform: translateY(30px) scale(0.97); filter: blur(4px);}
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0);}
        }
        @keyframes glitchFade {
            0% { opacity: 0; clip-path: inset(10% 0 90% 0);}
            100% { opacity: 1; clip-path: inset(0 0 0 0);}
        }
        @media (max-width: 700px) {
            .menu-card h1 { font-size: 2.4rem; }
            .info-panel { gap: 8px; justify-content: center; }
            .score-box span, .coins-box span { font-size: 1.2rem; }
            .shop-item, .setting-item { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="mainMenu" class="main-menu">
        <div class="menu-card">
            <h1>✦ NEON MATCH-3 ✦</h1>
            <button id="playBtn">▶ ЗАПУСТИТЬ</button>
            <button id="settingsBtn">⚡ НЕЙРО-НАСТРОЙКИ</button>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <h3>🛸 КИБЕР-МАРКЕТ</h3>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>🔧 НЕЙРО-ИНТЕРФЕЙС</h3>
            <div class="setting-item"><label>🎵 СИНТ-МУЗЫКА</label><input type="checkbox" id="musicToggle" checked></div>
            <div class="setting-item"><label>🔊 ЭФФЕКТЫ</label><input type="checkbox" id="sfxToggle" checked></div>

                <select id="fpsLimitSelect">

            <div class="setting-item"><label>🎶 КАСТОМНАЯ МУЗЫКА</label><input type="file" id="customMusic" accept="audio/*"></div>

                <div class="asset-item"><label>ТИП 1</label><input type="file" id="asset0" accept="image/*"></div>

                <div class="asset-item"><label>ТИП 3</label><input type="file" id="asset2" accept="image/*"></div>
                <div class="asset-item"><label>ТИП 4</label><input type="file" id="asset3" accept="image/*"></div>
                <div class="asset-item"><label>ТИП 5</label><input type="file" id="asset4" accept="image/*"></div>
                <div class="asset-item"><label>ТИП 6</label><input type="file" id="asset5" accept="image/*"></div>
                <div class="asset-item"><label>💣 БОМБА</label><input type="file" id="bombAsset" accept="image/*"></div>
            </div>
            <button id="resetProgressBtn" style="background:#330000; border-color:red;">⚠️ СБРОС ПРОГРЕССА</button>

    <div id="fpsCounter" class="fps-counter">FPS: --</div>

    <script>
        (function(){
            // ========== АУДИО (без изменений) ==========
            let audioCtx = null;
            let musicEnabled = true;
            let sfxEnabled = true;
            let musicVolume = 0.5;
            let masterGain = null;
            let isAudioInit = false;
            let customMusicAudio = null;
            let customMatchSoundAudio = null;
            let musicInterval = null;
            let currentMelody = 0;
            const melodies = [
                { name: "Калинка", notes: [523.25,587.33,622.25,523.25,440.00,392.00,349.23,392.00,440.00,392.00,349.23,311.13,293.66,261.63,293.66,261.63,349.23,392.00,440.00,523.25,523.25,493.88,440.00,392.00,349.23,311.13,293.66,261.63], waveType: "triangle", intervalMs: 550 },
                { name: "Веселая", notes: [523.25,587.33,659.25,523.25,493.88,440.00,392.00,440.00,493.88,523.25,587.33,659.25,698.46,659.25,587.33,523.25], waveType: "sine", intervalMs: 480 },
                { name: "Электро", notes: [440.00,554.37,659.25,880.00,659.25,554.37,440.00,329.63,293.66,329.63,440.00,554.37,659.25,440.00], waveType: "sawtooth", intervalMs: 400 }
            ];
            let currentNoteIndex = 0;
            function playMelodyTick() {
                if (!musicEnabled || !audioCtx || !masterGain) return;
                const melody = melodies[currentMelody];
                const note = melody.notes[currentNoteIndex % melody.notes.length];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = melody.waveType;
                osc.frequency.value = note;
                gain.gain.setValueAtTime(0.55 * musicVolume, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(now + 0.3);
                currentNoteIndex++;
            }
            function startSynthMusic() { if (musicInterval) clearInterval(musicInterval); if (!musicEnabled || !audioCtx || !masterGain) return; const melody = melodies[currentMelody]; musicInterval = setInterval(() => { if (musicEnabled && audioCtx && masterGain) playMelodyTick(); }, melody.intervalMs); }
            function stopMusic() { if (musicInterval) { clearInterval(musicInterval); musicInterval = null; } if (customMusicAudio) { customMusicAudio.pause(); customMusicAudio.currentTime = 0; } }
            function startMusic() { stopMusic(); if (!musicEnabled) return; if (customMusicAudio && customMusicAudio.src && customMusicAudio.src !== "") { customMusicAudio.volume = musicVolume; customMusicAudio.loop = true; customMusicAudio.play().catch(e=>{}); } else { startSynthMusic(); } }
            function setMusicEnabled(enabled) { musicEnabled = enabled; saveAudioSettings(); if (enabled) startMusic(); else stopMusic(); }
            function setSfxEnabled(enabled) { sfxEnabled = enabled; saveAudioSettings(); }
            function setMusicVolume(volume) { musicVolume = Math.min(1, Math.max(0, volume)); if (masterGain) masterGain.gain.value = musicVolume; if (customMusicAudio) customMusicAudio.volume = musicVolume; saveAudioSettings(); }
            function saveAudioSettings() { localStorage.setItem('match3MusicEnabled', musicEnabled); localStorage.setItem('match3SfxEnabled', sfxEnabled); localStorage.setItem('match3MusicVolume', musicVolume); localStorage.setItem('match3CurrentMelody', currentMelody); if (customMusicAudio && customMusicAudio.src) localStorage.setItem('match3CustomMusic', customMusicAudio.src); else localStorage.removeItem('match3CustomMusic'); if (customMatchSoundAudio && customMatchSoundAudio.src) localStorage.setItem('match3CustomMatchSound', customMatchSoundAudio.src); else localStorage.removeItem('match3CustomMatchSound'); }
            function loadAudioSettings() { const savedMusic = localStorage.getItem('match3MusicEnabled'); if (savedMusic !== null) musicEnabled = savedMusic === 'true'; const savedSfx = localStorage.getItem('match3SfxEnabled'); if (savedSfx !== null) sfxEnabled = savedSfx === 'true'; const savedVolume = localStorage.getItem('match3MusicVolume'); if (savedVolume !== null) musicVolume = parseFloat(savedVolume); const savedMelody = localStorage.getItem('match3CurrentMelody'); if (savedMelody !== null) currentMelody = parseInt(savedMelody); document.getElementById('musicToggle').checked = musicEnabled; document.getElementById('sfxToggle').checked = sfxEnabled; document.getElementById('volumeSlider').value = musicVolume * 100; const customMusicSrc = localStorage.getItem('match3CustomMusic'); if (customMusicSrc) { const audio = new Audio(customMusicSrc); audio.loop = true; audio.volume = musicVolume; customMusicAudio = audio; if (musicEnabled) startMusic(); } const customSoundSrc = localStorage.getItem('match3CustomMatchSound'); if (customSoundSrc) { const audio = new Audio(customSoundSrc); audio.volume = musicVolume; customMatchSoundAudio = audio; } }
            function initAudio() { if (isAudioInit) return; if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.gain.value = musicVolume; masterGain.connect(audioCtx.destination); } isAudioInit = true; if (musicEnabled) startMusic(); }
            function playMatchSound() { if (!sfxEnabled) return; if (customMatchSoundAudio && customMatchSoundAudio.src) { const sound = customMatchSoundAudio.cloneNode(); sound.volume = musicVolume; sound.play().catch(e=>{}); } else if (audioCtx) { const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.value = 880; gain.gain.setValueAtTime(0.3 * musicVolume, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2); osc.frequency.exponentialRampToValueAtTime(440, now + 0.15); osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(now + 0.2); } }
            function playBombSound() { if (!sfxEnabled) return; if (audioCtx) { const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.value = 220; gain.gain.setValueAtTime(0.5 * musicVolume, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4); osc.frequency.exponentialRampToValueAtTime(110, now + 0.3); osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(now + 0.5); } }

            // ========== ИГРОВАЯ ЛОГИКА (оптимизированная) ==========
            let rows = 8, cols = 8;
            const TYPES = 6;
            const BOMB_TYPE = -2;
            const WALL_TYPE = -3;
            let board = [];
            let score = 0;
            let coins = 0;
            let isProcessing = false;
            let tileImages = [];

                animateSwap(r1,c1,r2,c2,()=>{
                    if (hasMatches()) processMatchesAndCascade();
                    else animateSwap(r2,c2,r1,c1,()=>{ isProcessing=false; drawBoard(); });
                });
                return true;
            }
            function processMatchesAndCascade() { 
                function step() { 
                    let removed = removeMatchesAndAddScore(); 
                    if (removed > 0) { 
                        let changes = []; 
                        let oldBoard = board.map(row=>[...row]); 
                        applyGravityAndRefill(); 
                        for (let c=0;c<cols;c++) { 
                            let oldCol=[]; for(let r=0;r<rows;r++) oldCol.push(oldBoard[r][c]); 
                            let newCol=[]; for(let r=0;r<rows;r++) newCol.push(board[r][c]); 
                            for(let r=0;r<rows;r++) if(oldCol[r]!==newCol[r] && oldCol[r]!==-1 && oldCol[r]!==BOMB_TYPE && !isWall(r,c)) 
                                for(let rr=r+1;rr<rows;rr++) if(newCol[rr]===oldCol[r]) { changes.push({ fromRow:r, fromCol:c, toRow:rr, toCol:c, type:oldCol[r] }); break; } 
                        } 
                        if(changes.length>0) animateFall(changes,()=>{ drawBoard(); step(); }); 
                        else { drawBoard(); step(); } 
                    } else { 
                        if(!hasValidMoves()) shuffleBoard(); 
                        else isProcessing = false; 
                        drawBoard(); saveGameState(); 
                    } 
                } 
                step(); 
            }
            function explodeBomb(row,col) { if (board[row][col] !== BOMB_TYPE) return; isProcessing = true; if(sfxEnabled) playBombSound(); for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(!isWall(r,c)) board[r][c] = -1; if(gameMode==="endless") { score+=1000; document.getElementById('scoreValue').innerText=score; addCoins(1000); } for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(!isWall(r,c)) board[r][c]=Math.floor(Math.random()*TYPES); clearMatchesAndRefill(); drawBoard(); isProcessing=false; saveGameState(); }
            function saveImagesToLocalStorage() { let imagesData=[]; for(let i=0;i<TYPES;i++) { if(tileImages[i] && tileImages[i].src && tileImages[i].src.startsWith('data:')) imagesData.push(tileImages[i].src); else imagesData.push(null); } localStorage.setItem('match3_images', JSON.stringify(imagesData)); if(bombImage && bombImage.src && bombImage.src.startsWith('data:')) localStorage.setItem('match3_bomb_image', bombImage.src); else localStorage.removeItem('match3_bomb_image'); }
            function loadImagesFromLocalStorage() { const savedImages = localStorage.getItem('match3_images'); if(savedImages) { const imagesData=JSON.parse(savedImages); for(let i=0;i<TYPES;i++) if(imagesData[i]) { const img=new Image(); img.src=imagesData[i]; tileImages[i]=img; } } const savedBomb = localStorage.getItem('match3_bomb_image'); if(savedBomb) { const bombImg=new Image(); bombImg.src=savedBomb; bombImage=bombImg; } }
            function loadAssetsFromInputs() { for(let i=0;i<TYPES;i++) { const input=document.getElementById(`asset${i}`); if(input.files && input.files[0]) { const reader=new FileReader(); reader.onload=(e)=>{ const img=new Image(); img.src=e.target.result; tileImages[i]=img; drawBoard(); saveImagesToLocalStorage(); }; reader.readAsDataURL(input.files[0]); } } const bombInput=document.getElementById('bombAsset'); if(bombInput.files && bombInput.files[0]) { const reader=new FileReader(); reader.onload=(e)=>{ const img=new Image(); img.src=e.target.result; bombImage=img; drawBoard(); saveImagesToLocalStorage(); }; reader.readAsDataURL(bombInput.files[0]); } }
            function getTileFromPoint(clientX,clientY) { const rect=canvas.getBoundingClientRect(); const scaleX=canvas.width/rect.width; const scaleY=canvas.height/rect.height; let canvasX=(clientX-rect.left)*scaleX; let canvasY=(clientY-rect.top)*scaleY; let col=Math.floor(canvasX/tileSize); let row=Math.floor(canvasY/tileSize); if(row>=0 && row<rows && col>=0 && col<cols) return {row,col}; return null; }
            function onDragStart(e) { if(isProcessing) return; e.preventDefault(); let clientX,clientY; if(e.touches) { clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; } else { clientX=e.clientX; clientY=e.clientY; } let tile=getTileFromPoint(clientX,clientY); if(!tile) return; if(board[tile.row][tile.col]===BOMB_TYPE) { explodeBomb(tile.row,tile.col); return; } if(isWall(tile.row,tile.col)) return; dragActive=true; dragStartRow=tile.row; dragStartCol=tile.col; dragTargetRow=tile.row; dragTargetCol=tile.col; drawBoard(); }
            function onDragMove(e) { if(!dragActive) return; e.preventDefault(); let clientX,clientY; if(e.touches) { clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; } else { clientX=e.clientX; clientY=e.clientY; } let tile=getTileFromPoint(clientX,clientY); if(tile) { dragTargetRow=tile.row; dragTargetCol=tile.col; } else { dragTargetRow=-1; dragTargetCol=-1; } drawBoard(); } // drawBoard вызывается только при изменении подсветки
            function onDragEnd(e) { if(!dragActive) return; e.preventDefault(); let clientX,clientY; if(e.changedTouches) { clientX=e.changedTouches[0].clientX; clientY=e.changedTouches[0].clientY; } else { clientX=e.clientX; clientY=e.clientY; } let tile=getTileFromPoint(clientX,clientY); if(tile && dragStartRow!==-1 && dragStartCol!==-1) { if(dragTargetRow===-1||dragTargetCol===-1) { dragTargetRow=tile.row; dragTargetCol=tile.col; } if(Math.abs(dragStartRow-dragTargetRow)+Math.abs(dragStartCol-dragTargetCol)===1) trySwap(dragStartRow,dragStartCol,dragTargetRow,dragTargetCol); } dragActive=false; dragStartRow=-1; dragStartCol=-1; dragTargetRow=-1; dragTargetCol=-1; drawBoard(); }
            function resetGame() { if(gameMode==="story") { storyGoal=generateRandomGoal(); storyCollected=0; updateGoalUI(); document.getElementById('scoreValue').innerText=`0/${storyGoal.count}`; } else { score=0; document.getElementById('scoreValue').innerText="0"; } coins=0; updateCoinsUI(); initBoard(); isProcessing=false; drawBoard(); saveGameState(); }
            function showMenu() { gameContainer.classList.remove('visible'); mainMenu.style.display='flex'; modeSelectDiv.style.display='none'; if(musicEnabled && audioCtx) { stopMusic(); startMusic(); } }
            
            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            const mainMenu = document.getElementById('mainMenu');
            const modeSelectDiv = document.getElementById('modeSelect');
            const gameContainer = document.getElementById('gameContainer');
            const playBtn = document.getElementById('playBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const endlessModeBtn = document.getElementById('endlessModeBtn');
            const storyModeBtn = document.getElementById('storyModeBtn');
            const cancelModeBtn = document.getElementById('cancelModeBtn');
            const menuReturnBtn = document.getElementById('menuReturnBtn');
            const gameSettingsBtn = document.getElementById('gameSettingsBtn');
            const shopBtn = document.getElementById('shopBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeSettingsBtn = document.getElementById('closeSettingsBtn');
            const musicToggle = document.getElementById('musicToggle');
            const sfxToggle = document.getElementById('sfxToggle');
            const volumeSlider = document.getElementById('volumeSlider');
            const customMusicInput = document.getElementById('customMusic');
            const customMatchSoundInput = document.getElementById('customMatchSound');
            const shopModal = document.getElementById('shopModal');
            const closeShopBtn = document.getElementById('closeShopBtn');
            const buyBombBtn = document.getElementById('buyBombBtn');
            const buyShuffleBtn = document.getElementById('buyShuffleBtn');
            const buyHintBtn = document.getElementById('buyHintBtn');
            const fieldTypeSelect = document.getElementById('fieldTypeSelect');
            const fpsLimitSelect = document.getElementById('fpsLimitSelect');
            const showFpsToggle = document.getElementById('showFpsToggle');
            
            customMusicInput.addEventListener('change', (e) => { if(e.target.files.length) { const file=e.target.files[0]; const url=URL.createObjectURL(file); if(customMusicAudio) customMusicAudio.pause(); customMusicAudio=new Audio(url); customMusicAudio.loop=true; customMusicAudio.volume=musicVolume; if(musicEnabled) startMusic(); saveAudioSettings(); } });
            customMatchSoundInput.addEventListener('change', (e) => { if(e.target.files.length) { const url=URL.createObjectURL(e.target.files[0]); customMatchSoundAudio=new Audio(url); customMatchSoundAudio.volume=musicVolume; saveAudioSettings(); } });
            function showGameWithMode(mode) { if(!isAudioInit) initAudio(); modeSelectDiv.style.display='none'; mainMenu.style.display='none'; gameContainer.classList.add('visible'); resizeCanvas(); startGame(mode); }
            playBtn.addEventListener('click',()=>{ modeSelectDiv.style.display='flex'; });
            endlessModeBtn.addEventListener('click',()=>showGameWithMode('endless'));
            storyModeBtn.addEventListener('click',()=>showGameWithMode('story'));
            cancelModeBtn.addEventListener('click',()=>{ modeSelectDiv.style.display='none'; });
            menuReturnBtn.addEventListener('click',showMenu);
            shopBtn.addEventListener('click',()=>{ if(gameContainer.classList.contains('visible')) { updateCoinsUI(); shopModal.style.display='flex'; } });
            closeShopBtn.addEventListener('click',()=>shopModal.style.display='none');
            buyBombBtn.addEventListener('click',()=>{ buyBomb(); shopModal.style.display='none'; });
            buyShuffleBtn.addEventListener('click',()=>{ buyShuffle(); shopModal.style.display='none'; });
            buyHintBtn.addEventListener('click',()=>{ buyHint(); shopModal.style.display='none'; });
            settingsBtn.addEventListener('click',()=>{ if(!isAudioInit) initAudio(); settingsModal.style.display='flex'; });
            gameSettingsBtn.addEventListener('click',()=>{ if(!isAudioInit) initAudio(); settingsModal.style.display='flex'; });
            closeSettingsBtn.addEventListener('click',()=>settingsModal.style.display='none');
            settingsModal.addEventListener('click',(e)=>{ if(e.target===settingsModal) settingsModal.style.display='none'; });
            shopModal.addEventListener('click',(e)=>{ if(e.target===shopModal) shopModal.style.display='none'; });
            musicToggle.addEventListener('change',(e)=>setMusicEnabled(e.target.checked));
            sfxToggle.addEventListener('change',(e)=>setSfxEnabled(e.target.checked));
            volumeSlider.addEventListener('input',(e)=>setMusicVolume(e.target.value/100));
            fieldTypeSelect.addEventListener('change',(e)=>{ if(confirm('Смена поля сбросит игру?')) { setFieldType(e.target.value); resetGame(); } else fieldTypeSelect.value=localStorage.getItem('match3_field_type')||'classic'; });
            fpsLimitSelect.addEventListener('change', (e) => { setFpsLimit(parseInt(e.target.value)); });
            showFpsToggle.addEventListener('change', (e) => { setShowFps(e.target.checked); });
            
            loadAudioSettings(); setMusicVolume(musicVolume); setMusicEnabled(musicEnabled); setSfxEnabled(sfxEnabled);
            loadFpsSettings();
            function enableAudioOnUserInteraction() { initAudio(); document.removeEventListener('click',enableAudioOnUserInteraction); document.removeEventListener('touchstart',enableAudioOnUserInteraction); }
            document.addEventListener('click',enableAudioOnUserInteraction); document.addEventListener('touchstart',enableAudioOnUserInteraction);
            for(let i=0;i<TYPES;i++) { const input=document.getElementById(`asset${i}`); if(input) input.addEventListener('change',loadAssetsFromInputs); }
            const bombInputAsset=document.getElementById('bombAsset'); if(bombInputAsset) bombInputAsset.addEventListener('change',loadAssetsFromInputs);
            loadImagesFromLocalStorage();
            if(!loadGameState()) { initBoard(); drawBoard(); } else { gameContainer.classList.add('visible'); mainMenu.style.display='none'; resizeCanvas(); drawBoard(); }
            canvas.addEventListener('mousedown',onDragStart); window.addEventListener('mousemove',onDragMove); window.addEventListener('mouseup',onDragEnd); canvas.addEventListener('touchstart',onDragStart,{passive:false}); document.addEventListener('touchmove',onDragMove,{passive:false}); document.addEventListener('touchend',onDragEnd,{passive:false});
            mainMenu.style.display='flex'; gameContainer.classList.remove('visible');
            const resetProgressBtn = document.getElementById('resetProgressBtn');
            if(resetProgressBtn) resetProgressBtn.addEventListener('click',()=>{ if(confirm('Сбросить всё?')) { const keys=['match3_board','match3_score','match3_mode','match3_story_goal_type','match3_story_goal_count','match3_story_goal_name','match3_story_collected','match3_images','match3_bomb_image','match3MusicEnabled','match3SfxEnabled','match3MusicVolume','match3CurrentMelody','match3CustomMusic','match3CustomMatchSound','match3_coins','match3_field_type','match3_fps_limit','match3_show_fps']; keys.forEach(k=>localStorage.removeItem(k)); location.reload(); } });
        })();
    </script>
