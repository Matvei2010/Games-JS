<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-нолики — ИИ с выбором сложности + Музыка</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a3c2c, #0e2a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 550px;
        }

        .menu-panel, .game-panel {
            background: #2c2b26;
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        h1 {
            color: #ffd966;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            color: #ffdd99;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .difficulty-btn {
            background: #3a2a1e;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: #ffefc0;
            border: none;
            box-shadow: 0 3px 0 #5a3a2a;
        }

        .difficulty-btn.active {
            background: #ff8844;
            color: white;
            box-shadow: 0 0 8px #ffaa44;
            transform: translateY(-1px);
        }

        .start-btn, .settings-menu-btn {
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 5px 0 #aa5533;
            margin-top: 15px;
            width: 100%;
        }

        .settings-menu-btn {
            font-size: 18px;
            padding: 10px 20px;
            margin-top: 10px;
            background: linear-gradient(145deg, #66aa66, #448844);
            box-shadow: 0 5px 0 #2a662a;
        }

        .start-btn:active, .settings-menu-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            background: #4a3729;
            padding: 12px;
            border-radius: 32px;
            margin-bottom: 20px;
        }

        .cell {
            background: #f9e7b3;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #aa8c5e;
            transform: translateY(-2px);
        }

        .cell:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa8c5e;
        }

        .cell.x { color: #e76f51; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .cell.o { color: #2a9d8f; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 24px;
            color: #ffefc0;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            background: #2e2b22;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .score {
            display: flex;
            gap: 20px;
        }
        .score div {
            background: #2e2b22;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 18px;
        }
        .score span {
            font-weight: bold;
            color: #ffaa66;
            font-size: 24px;
            margin-left: 8px;
        }

        button {
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 5px 0 #aa5533;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        /* Модальное окно настроек */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #2c2b26;
            border-radius: 48px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            border: 1px solid #ffaa66;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            color: #ffd966;
            margin-bottom: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            color: #ffefc0;
        }
        .setting-item label {
            font-size: 18px;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
            background: #ffaa66;
            border-radius: 20px;
        }
        .melody-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }
        .melody-btn {
            background: #3a2a1e;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            color: #ffdd99;
        }
        .melody-btn.active {
            background: #ff8844;
            color: white;
        }
        .close-modal {
            margin-top: 20px;
            background: #ffaa55;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 500px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 8px;
            }
            .cell { font-size: 48px; }
            .status { font-size: 16px; padding: 6px 16px; }
            button { padding: 6px 20px; font-size: 16px; }
            .score div { font-size: 14px; padding: 3px 12px; }
            .score span { font-size: 20px; }
            .difficulty-btn { font-size: 14px; padding: 6px 14px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- МЕНЮ -->
    <div id="menuPanel" class="menu-panel">
        <h1>⚡ Крестики-нолики ⚡</h1>
        <h2>Выбери сложность ИИ</h2>
        <div class="difficulty-buttons">
            <button data-diff="easy" class="difficulty-btn">🍃 Лёгкий</button>
            <button data-diff="medium" class="difficulty-btn active">⚡ Средний</button>
            <button data-diff="hard" class="difficulty-btn">🔥 Сложный</button>
        </div>
        <button id="startGameBtn" class="start-btn">🎮 ИГРАТЬ</button>
        <button id="menuSettingsBtn" class="settings-menu-btn">⚙️ НАСТРОЙКИ</button>
        <div style="margin-top: 20px; font-size: 14px; color: #ccaa77;">🎯 Сложный — идеальная игра | Средний — иногда ошибается | Лёгкий — случайные ходы</div>
    </div>

    <!-- ИГРОВАЯ ОБЛАСТЬ -->
    <div id="gamePanel" class="game-panel hidden">
        <div class="board" id="board"></div>
        <div class="info-panel">
            <div class="status" id="status">Ваш ход (X)</div>
            <div class="score">
                <div>🏆 Вы: <span id="playerScore">0</span></div>
                <div>🤖 ИИ: <span id="aiScore">0</span></div>
                <div>🤝 Ничьи: <span id="drawScore">0</span></div>
            </div>
            <button id="menuReturnBtn">🏠 Меню</button>
            <button id="resetGameBtn">🔄 Заново</button>
        </div>
    </div>
</div>

<!-- Модальное окно настроек -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ НАСТРОЙКИ</h3>
        <div class="setting-item">
            <label>🎵 Музыка</label>
            <input type="checkbox" id="musicToggle" checked>
        </div>
        <div class="setting-item">
            <label>🔊 Звуки</label>
            <input type="checkbox" id="sfxToggle" checked>
        </div>
        <div class="setting-item">
            <label>🔊 Громкость</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
        </div>
        <div class="setting-item">
            <label>🎼 Мелодия</label>
            <div class="melody-selector" id="melodySelector">
                <div data-melody="0" class="melody-btn">Калинка</div>
                <div data-melody="1" class="melody-btn">Веселая</div>
                <div data-melody="2" class="melody-btn">Электро</div>
            </div>
        </div>
        <button class="close-modal" id="closeSettingsBtn">Закрыть</button>
    </div>
</div>

<script>
    (function() {
        // ========== АУДИО СИСТЕМА ==========
        let audioCtx = null;
        let musicEnabled = true;
        let sfxEnabled = true;
        let musicVolume = 0.5;
        let masterGain = null;
        let musicInterval = null;
        let isAudioInit = false;
        let currentMelody = 0;

        const melodies = [
            { name: "Калинка", notes: [523.25, 587.33, 622.25, 523.25, 440.00, 392.00, 349.23, 392.00, 440.00, 392.00, 349.23, 311.13, 293.66, 261.63, 293.66, 261.63, 349.23, 392.00, 440.00, 523.25, 523.25, 493.88, 440.00, 392.00, 349.23, 311.13, 293.66, 261.63], waveType: "triangle", intervalMs: 550 },
            { name: "Веселая", notes: [523.25, 587.33, 659.25, 523.25, 493.88, 440.00, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 659.25, 587.33, 523.25], waveType: "sine", intervalMs: 480 },
            { name: "Электро", notes: [440.00, 554.37, 659.25, 880.00, 659.25, 554.37, 440.00, 329.63, 293.66, 329.63, 440.00, 554.37, 659.25, 440.00], waveType: "sawtooth", intervalMs: 400 }
        ];
        let currentNoteIndex = 0;

        function playMelodyTick() {
            if (!musicEnabled || !audioCtx || !masterGain) return;
            const melody = melodies[currentMelody];
            const note = melody.notes[currentNoteIndex % melody.notes.length];
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = melody.waveType;
            osc.frequency.value = note;
            gain.gain.setValueAtTime(0.55 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.3);
            currentNoteIndex++;
        }

        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            if (!musicEnabled || !audioCtx || !masterGain) return;
            const melody = melodies[currentMelody];
            musicInterval = setInterval(() => {
                if (musicEnabled && audioCtx && masterGain) playMelodyTick();
            }, melody.intervalMs);
        }

        function stopMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }

        function setMusicEnabled(enabled) {
            musicEnabled = enabled;
            saveAudioSettings();
            if (enabled && audioCtx && masterGain) startMusic();
            else stopMusic();
        }

        function setSfxEnabled(enabled) {
            sfxEnabled = enabled;
            saveAudioSettings();
        }

        function setMusicVolume(volume) {
            musicVolume = Math.min(1, Math.max(0, volume));
            if (masterGain) masterGain.gain.value = musicVolume;
            saveAudioSettings();
        }

        function setMelody(index) {
            currentMelody = Math.min(index, melodies.length-1);
            saveAudioSettings();
            if (musicEnabled && audioCtx) {
                stopMusic();
                startMusic();
            }
            updateMelodyUI();
        }

        function saveAudioSettings() {
            localStorage.setItem('tttMusicEnabled', musicEnabled);
            localStorage.setItem('tttSfxEnabled', sfxEnabled);
            localStorage.setItem('tttMusicVolume', musicVolume);
            localStorage.setItem('tttCurrentMelody', currentMelody);
        }

        function loadAudioSettings() {
            const savedMusic = localStorage.getItem('tttMusicEnabled');
            if (savedMusic !== null) musicEnabled = savedMusic === 'true';
            const savedSfx = localStorage.getItem('tttSfxEnabled');
            if (savedSfx !== null) sfxEnabled = savedSfx === 'true';
            const savedVolume = localStorage.getItem('tttMusicVolume');
            if (savedVolume !== null) musicVolume = parseFloat(savedVolume);
            const savedMelody = localStorage.getItem('tttCurrentMelody');
            if (savedMelody !== null) currentMelody = parseInt(savedMelody);
            document.getElementById('musicToggle').checked = musicEnabled;
            document.getElementById('sfxToggle').checked = sfxEnabled;
            document.getElementById('volumeSlider').value = musicVolume * 100;
            updateMelodyUI();
        }

        function updateMelodyUI() {
            document.querySelectorAll('.melody-btn').forEach((btn, idx) => {
                if (idx == currentMelody) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function initAudio() {
            if (isAudioInit) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = musicVolume;
                masterGain.connect(audioCtx.destination);
            }
            isAudioInit = true;
            if (musicEnabled) startMusic();
        }

        // Звуковые эффекты
        function playClickSound() {
            if (!sfxEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 660;
            gain.gain.setValueAtTime(0.2 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.15);
        }

        function playWinSound(isPlayerWin) {
            if (!sfxEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            if (isPlayerWin) {
                osc.frequency.value = 880;
                osc.frequency.exponentialRampToValueAtTime(1320, now + 0.3);
            } else {
                osc.frequency.value = 440;
                osc.frequency.exponentialRampToValueAtTime(330, now + 0.3);
            }
            gain.gain.setValueAtTime(0.3 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.4);
        }

        function playDrawSound() {
            if (!sfxEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = 523.25;
            gain.gain.setValueAtTime(0.25 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.2);
        }

        // ========== ИГРОВАЯ ЛОГИКА ==========
        let board = [
            ['', '', ''],
            ['', '', ''],
            ['', '', '']
        ];
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let aiScore = 0;
        let drawScore = 0;
        let difficulty = 'medium';

        const menuPanel = document.getElementById('menuPanel');
        const gamePanel = document.getElementById('gamePanel');
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const playerScoreSpan = document.getElementById('playerScore');
        const aiScoreSpan = document.getElementById('aiScore');
        const drawScoreSpan = document.getElementById('drawScore');

        function renderBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (board[i][j] === 'X') cell.classList.add('x');
                    if (board[i][j] === 'O') cell.classList.add('o');
                    cell.textContent = board[i][j] === 'X' ? '❌' : (board[i][j] === 'O' ? '⭕' : '');
                    cell.addEventListener('click', (function(row, col) {
                        return function() { handlePlayerMove(row, col); };
                    })(i, j));
                    boardElement.appendChild(cell);
                }
            }
        }

        function checkWinner(boardState) {
            const winPatterns = [
                [[0,0],[0,1],[0,2]], [[1,0],[1,1],[1,2]], [[2,0],[2,1],[2,2]],
                [[0,0],[1,0],[2,0]], [[0,1],[1,1],[2,1]], [[0,2],[1,2],[2,2]],
                [[0,0],[1,1],[2,2]], [[0,2],[1,1],[2,0]]
            ];
            for (let pattern of winPatterns) {
                const [a,b,c] = pattern;
                const val = boardState[a[0]][a[1]];
                if (val && val === boardState[b[0]][b[1]] && val === boardState[c[0]][c[1]]) return val;
            }
            return null;
        }

        function isDraw(boardState) {
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (boardState[i][j] === '') return false;
            return true;
        }

        function updateGameStatus(winner) {
            if (winner === 'X') {
                statusElement.textContent = '🎉 Вы победили! 🎉';
                playerScore++;
                playerScoreSpan.textContent = playerScore;
                gameActive = false;
                playWinSound(true);
            } else if (winner === 'O') {
                statusElement.textContent = '🤖 ИИ победил! 🤖';
                aiScore++;
                aiScoreSpan.textContent = aiScore;
                gameActive = false;
                playWinSound(false);
            } else if (isDraw(board)) {
                statusElement.textContent = '🤝 Ничья! 🤝';
                drawScore++;
                drawScoreSpan.textContent = drawScore;
                gameActive = false;
                playDrawSound();
            } else {
                statusElement.textContent = currentPlayer === 'X' ? 'Ваш ход (X)' : 'Ход ИИ (O)...';
            }
        }

        function endTurn(winner) {
            updateGameStatus(winner);
            renderBoard();
            if (gameActive && currentPlayer === 'O') setTimeout(() => aiMove(), 200);
        }

        function handlePlayerMove(row, col) {
            if (!gameActive || currentPlayer !== 'X') return;
            if (board[row][col] !== '') return;
            board[row][col] = 'X';
            renderBoard();
            playClickSound();
            const winner = checkWinner(board);
            if (winner || isDraw(board)) {
                gameActive = false;
                endTurn(winner);
                return;
            }
            currentPlayer = 'O';
            endTurn(null);
        }

        // AI
        function minimax(boardState, depth, isMaximizing, alpha, beta) {
            const winner = checkWinner(boardState);
            if (winner === 'X') return -10 + depth;
            if (winner === 'O') return 10 - depth;
            if (isDraw(boardState)) return 0;
            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (boardState[i][j] === '') {
                            boardState[i][j] = 'O';
                            let eval = minimax(boardState, depth + 1, false, alpha, beta);
                            boardState[i][j] = '';
                            maxEval = Math.max(maxEval, eval);
                            alpha = Math.max(alpha, eval);
                            if (beta <= alpha) break;
                        }
                    }
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (boardState[i][j] === '') {
                            boardState[i][j] = 'X';
                            let eval = minimax(boardState, depth + 1, true, alpha, beta);
                            boardState[i][j] = '';
                            minEval = Math.min(minEval, eval);
                            beta = Math.min(beta, eval);
                            if (beta <= alpha) break;
                        }
                    }
                }
                return minEval;
            }
        }

        function getBestMoveHard() {
            let bestScore = -Infinity, bestMove = null;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i][j] === '') {
                        board[i][j] = 'O';
                        let score = minimax(board, 0, false, -Infinity, Infinity);
                        board[i][j] = '';
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = { row: i, col: j };
                        }
                    }
                }
            }
            return bestMove;
        }

        function getRandomMove() {
            let empty = [];
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (board[i][j] === '') empty.push({ row: i, col: j });
            return empty.length ? empty[Math.floor(Math.random() * empty.length)] : null;
        }

        function getMediumMove() {
            return Math.random() < 0.4 ? getRandomMove() : getBestMoveHard();
        }

        function aiMove() {
            if (!gameActive || currentPlayer !== 'O') return;
            let move = null;
            if (difficulty === 'easy') move = getRandomMove();
            else if (difficulty === 'medium') move = getMediumMove();
            else move = getBestMoveHard();
            if (move) {
                board[move.row][move.col] = 'O';
                renderBoard();
                playClickSound();
                const winner = checkWinner(board);
                if (winner || isDraw(board)) {
                    gameActive = false;
                    endTurn(winner);
                    return;
                }
                currentPlayer = 'X';
                endTurn(null);
            } else if (isDraw(board)) endTurn(null);
        }

        function resetGameState() {
            board = [['','',''],['','',''],['','','']];
            currentPlayer = 'X';
            gameActive = true;
            statusElement.textContent = 'Ваш ход (X)';
            renderBoard();
        }

        function startNewGame() {
            playerScore = 0; aiScore = 0; drawScore = 0;
            playerScoreSpan.textContent = '0';
            aiScoreSpan.textContent = '0';
            drawScoreSpan.textContent = '0';
            resetGameState();
            gamePanel.classList.remove('hidden');
            menuPanel.classList.add('hidden');
        }

        function returnToMenu() {
            gamePanel.classList.add('hidden');
            menuPanel.classList.remove('hidden');
            resetGameState();
            stopMusic();
            if (musicEnabled && audioCtx) startMusic();
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ИНТЕРФЕЙСА ==========
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.getAttribute('data-diff');
            });
        });

        document.getElementById('startGameBtn').addEventListener('click', () => {
            if (!isAudioInit) initAudio();
            startNewGame();
        });
        document.getElementById('menuReturnBtn').addEventListener('click', returnToMenu);
        document.getElementById('resetGameBtn').addEventListener('click', resetGameState);

        // Настройки
        const settingsModal = document.getElementById('settingsModal');
        document.getElementById('menuSettingsBtn').addEventListener('click', () => {
            if (!isAudioInit) initAudio();
            settingsModal.style.display = 'flex';
        });
        document.getElementById('closeSettingsBtn').addEventListener('click', () => settingsModal.style.display = 'none');
        settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.style.display = 'none'; });

        document.getElementById('musicToggle').addEventListener('change', (e) => setMusicEnabled(e.target.checked));
        document.getElementById('sfxToggle').addEventListener('change', (e) => setSfxEnabled(e.target.checked));
        document.getElementById('volumeSlider').addEventListener('input', (e) => setMusicVolume(e.target.value / 100));
        document.querySelectorAll('.melody-btn').forEach(btn => {
            btn.addEventListener('click', () => setMelody(parseInt(btn.dataset.melody)));
        });

        loadAudioSettings();
        setMusicVolume(musicVolume);
        setMusicEnabled(musicEnabled);
        setSfxEnabled(sfxEnabled);

        // Активация аудио по первому взаимодействию
        function enableAudioOnUserInteraction() {
            initAudio();
            document.removeEventListener('click', enableAudioOnUserInteraction);
            document.removeEventListener('touchstart', enableAudioOnUserInteraction);
        }
        document.addEventListener('click', enableAudioOnUserInteraction);
        document.addEventListener('touchstart', enableAudioOnUserInteraction);

        // Стартовое состояние
        resetGameState();
        gamePanel.classList.add('hidden');
        menuPanel.classList.remove('hidden');
    })();
</script>
</body>
</html>
