<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍎 Три в ряд | Match-3 Game</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a, #0e2a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Главное меню */
        .main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .menu-card {
            background: radial-gradient(circle at 30% 20%, #ffd89b, #c7e9fb);
            border-radius: 64px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid #ffaa66;
            max-width: 400px;
            width: 90%;
        }
        .menu-card h1 {
            font-size: 48px;
            color: #ff6633;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .menu-card button {
            width: 100%;
            margin: 12px 0;
            padding: 14px;
            font-size: 22px;
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 5px 0 #aa5533;
        }
        .menu-card button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        /* Игровой контейнер */
        .game-container {
            background: #ffefcf;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.8);
            text-align: center;
            display: none;
        }
        .game-container.visible {
            display: block;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            background: #f9e7b3;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 24px;
            color: #ffefcf;
        }

        .score-box {
            background: #f9e7b3;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #c25d2e;
            font-size: 1.2rem;
        }
        .score-box span {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff6633;
            margin-left: 8px;
        }

        button {
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 4px 0 #aa5533;
            transition: 0.1s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        .copyright {
            margin-top: 15px;
            font-size: 11px;
            color: #ccc;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
        }

        /* Модальное окно настроек */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #2c2b26;
            border-radius: 48px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            border: 1px solid #ffaa66;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            color: #ffd966;
            margin-bottom: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            color: #ffefc0;
        }
        .setting-item label {
            font-size: 18px;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
            background: #ffaa66;
            border-radius: 20px;
        }
        .melody-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }
        .melody-btn {
            background: #3a2a1e;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            color: #ffdd99;
            transition: 0.1s;
        }
        .melody-btn.active {
            background: #ff8844;
            color: white;
        }
        .close-modal {
            margin-top: 20px;
            background: #ffaa55;
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .game-container {
                padding: 12px;
            }
            .score-box {
                font-size: 0.9rem;
                padding: 4px 16px;
            }
            .score-box span {
                font-size: 1.4rem;
            }
            button {
                padding: 6px 18px;
                font-size: 0.9rem;
            }
            .melody-btn {
                padding: 4px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <div id="mainMenu" class="main-menu">
        <div class="menu-card">
            <h1>🍎 MATCH-3</h1>
            <button id="playBtn">▶ ИГРАТЬ</button>
            <button id="settingsBtn">⚙️ НАСТРОЙКИ</button>
        </div>
    </div>

    <!-- Игровой контейнер -->
    <div id="gameContainer" class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info-panel">
            <div class="score-box">🍎 СЧЁТ: <span id="scoreValue">0</span></div>
            <button id="shuffleBtn">🔄 ПЕРЕМЕШАТЬ</button>
            <button id="menuReturnBtn">🏠 МЕНЮ</button>
        </div>
        <div class="copyright">World Dev Games | Все права защищены</div>
    </div>

    <!-- Модалка настроек -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>⚙️ НАСТРОЙКИ</h3>
            <div class="setting-item">
                <label>🎵 Музыка</label>
                <input type="checkbox" id="musicToggle" checked>
            </div>
            <div class="setting-item">
                <label>🔊 Звук сбора</label>
                <input type="checkbox" id="sfxToggle" checked>
            </div>
            <div class="setting-item">
                <label>🔊 Громкость</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>
            <div class="setting-item">
                <label>🎼 Мелодия</label>
                <div class="melody-selector" id="melodySelector">
                    <div data-melody="0" class="melody-btn">Калинка</div>
                    <div data-melody="1" class="melody-btn">Веселая</div>
                    <div data-melody="2" class="melody-btn">Электро</div>
                </div>
            </div>
            <button class="close-modal" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

<script>
    (function(){
        // ---------- АУДИО СИСТЕМА ----------
        let audioCtx = null;
        let musicEnabled = true;
        let sfxEnabled = true;
        let musicVolume = 0.5;
        let masterGain = null;
        let musicInterval = null;
        let isAudioInit = false;
        let currentMelody = 0;

        // Мелодии (как в Fruit Fiesta)
        const melodies = [
            { name: "Калинка", notes: [523.25, 587.33, 622.25, 523.25, 440.00, 392.00, 349.23, 392.00, 440.00, 392.00, 349.23, 311.13, 293.66, 261.63, 293.66, 261.63, 349.23, 392.00, 440.00, 523.25, 523.25, 493.88, 440.00, 392.00, 349.23, 311.13, 293.66, 261.63], waveType: "triangle", intervalMs: 550 },
            { name: "Веселая", notes: [523.25, 587.33, 659.25, 523.25, 493.88, 440.00, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 659.25, 587.33, 523.25], waveType: "sine", intervalMs: 480 },
            { name: "Электро", notes: [440.00, 554.37, 659.25, 880.00, 659.25, 554.37, 440.00, 329.63, 293.66, 329.63, 440.00, 554.37, 659.25, 440.00], waveType: "sawtooth", intervalMs: 400 }
        ];
        let currentNoteIndex = 0;

        function playMelodyTick() {
            if (!musicEnabled || !audioCtx || !masterGain) return;
            const melody = melodies[currentMelody];
            const note = melody.notes[currentNoteIndex % melody.notes.length];
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = melody.waveType;
            osc.frequency.value = note;
            gain.gain.setValueAtTime(0.55 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.3);
            currentNoteIndex++;
        }

        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            if (!musicEnabled || !audioCtx || !masterGain) return;
            const melody = melodies[currentMelody];
            musicInterval = setInterval(() => {
                if (musicEnabled && audioCtx && masterGain) playMelodyTick();
            }, melody.intervalMs);
        }

        function stopMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }

        function setMusicEnabled(enabled) {
            musicEnabled = enabled;
            saveAudioSettings();
            if (enabled && audioCtx && masterGain) startMusic();
            else stopMusic();
        }

        function setSfxEnabled(enabled) {
            sfxEnabled = enabled;
            saveAudioSettings();
        }

        function setMusicVolume(volume) {
            musicVolume = Math.min(1, Math.max(0, volume));
            if (masterGain) masterGain.gain.value = musicVolume;
            saveAudioSettings();
        }

        function setMelody(index) {
            currentMelody = Math.min(index, melodies.length-1);
            saveAudioSettings();
            if (musicEnabled && audioCtx) {
                stopMusic();
                startMusic();
            }
            updateMelodyUI();
        }

        function saveAudioSettings() {
            localStorage.setItem('match3MusicEnabled', musicEnabled);
            localStorage.setItem('match3SfxEnabled', sfxEnabled);
            localStorage.setItem('match3MusicVolume', musicVolume);
            localStorage.setItem('match3CurrentMelody', currentMelody);
        }

        function loadAudioSettings() {
            const savedMusic = localStorage.getItem('match3MusicEnabled');
            if (savedMusic !== null) musicEnabled = savedMusic === 'true';
            const savedSfx = localStorage.getItem('match3SfxEnabled');
            if (savedSfx !== null) sfxEnabled = savedSfx === 'true';
            const savedVolume = localStorage.getItem('match3MusicVolume');
            if (savedVolume !== null) musicVolume = parseFloat(savedVolume);
            const savedMelody = localStorage.getItem('match3CurrentMelody');
            if (savedMelody !== null) currentMelody = parseInt(savedMelody);
            document.getElementById('musicToggle').checked = musicEnabled;
            document.getElementById('sfxToggle').checked = sfxEnabled;
            document.getElementById('volumeSlider').value = musicVolume * 100;
            updateMelodyUI();
        }

        function updateMelodyUI() {
            document.querySelectorAll('.melody-btn').forEach((btn, idx) => {
                if (idx == currentMelody) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function initAudio() {
            if (isAudioInit) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = musicVolume;
                masterGain.connect(audioCtx.destination);
            }
            isAudioInit = true;
            if (musicEnabled) startMusic();
        }

        // Звук при совпадении трёх объектов
        function playMatchSound() {
            if (!sfxEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3 * musicVolume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.frequency.exponentialRampToValueAtTime(440, now + 0.15);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(now + 0.2);
        }

        // ---------- ИГРОВАЯ ЛОГИКА (без изменений, только добавлен вызов звука) ----------
        const ROWS = 8;
        const COLS = 8;
        const TILE_SIZE = 50;
        const TYPES = 6;
        const BASE_SCORE = 10;

        const EMOJIS = ["🍎", "🍊", "🍒", "🍓", "🍇", "🍉"];
        const COLORS = [
            "#e34234", "#ffa500", "#c04040",
            "#ff69b4", "#8b5a2b", "#3c9e3c"
        ];

        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let board = [];
        let score = 0;
        let selectedRow = -1, selectedCol = -1;
        let isProcessing = false;

        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = Math.floor(Math.random() * TYPES);
                }
            }
            clearMatchesAndRefill();
        }

        function getMatchesSet() {
            let matches = new Set();
            for (let r = 0; r < ROWS; r++) {
                let len = 1;
                for (let c = 1; c <= COLS; c++) {
                    if (c < COLS && board[r][c] === board[r][c-1]) {
                        len++;
                    } else {
                        if (len >= 3) {
                            for (let i = c - len; i < c; i++) matches.add(`${r},${i}`);
                        }
                        len = 1;
                    }
                }
            }
            for (let c = 0; c < COLS; c++) {
                let len = 1;
                for (let r = 1; r <= ROWS; r++) {
                    if (r < ROWS && board[r][c] === board[r-1][c]) {
                        len++;
                    } else {
                        if (len >= 3) {
                            for (let i = r - len; i < r; i++) matches.add(`${i},${c}`);
                        }
                        len = 1;
                    }
                }
            }
            return matches;
        }

        function hasMatches() {
            return getMatchesSet().size > 0;
        }

        function removeMatchesAndAddScore() {
            let matchesSet = getMatchesSet();
            if (matchesSet.size === 0) return 0;
            let removedCount = 0;
            for (const coord of matchesSet) {
                let [r, c] = coord.split(',').map(Number);
                if (board[r][c] !== -1) {
                    board[r][c] = -1;
                    removedCount++;
                }
            }
            let points = removedCount * BASE_SCORE;
            score += points;
            updateScoreUI();

            // Звук при совпадении
            if (removedCount > 0 && sfxEnabled) playMatchSound();

            return removedCount;
        }

        function applyGravityAndRefill() {
            for (let c = 0; c < COLS; c++) {
                let column = [];
                for (let r = ROWS-1; r >= 0; r--) {
                    if (board[r][c] !== -1) column.push(board[r][c]);
                }
                while (column.length < ROWS) {
                    column.push(Math.floor(Math.random() * TYPES));
                }
                column.reverse();
                for (let r = 0; r < ROWS; r++) board[r][c] = column[r];
            }
        }

        function clearMatchesAndRefill() {
            let anyRemoved = false;
            while (true) {
                let removed = removeMatchesAndAddScore();
                if (removed === 0) break;
                anyRemoved = true;
                applyGravityAndRefill();
            }
            if (anyRemoved) drawBoard();
            return anyRemoved;
        }

        function hasValidMoves() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (c + 1 < COLS) {
                        swapCells(r, c, r, c+1);
                        let has = hasMatches();
                        swapCells(r, c, r, c+1);
                        if (has) return true;
                    }
                    if (r + 1 < ROWS) {
                        swapCells(r, c, r+1, c);
                        let has = hasMatches();
                        swapCells(r, c, r+1, c);
                        if (has) return true;
                    }
                }
            }
            return false;
        }

        function swapCells(r1,c1, r2,c2) {
            let temp = board[r1][c1];
            board[r1][c1] = board[r2][c2];
            board[r2][c2] = temp;
        }

        function shuffleBoard() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = Math.floor(Math.random() * TYPES);
                }
            }
            clearMatchesAndRefill();
            drawBoard();
            selectedRow = -1; selectedCol = -1;
        }

        function trySwap(r1,c1, r2,c2) {
            if (isProcessing) return false;
            if (Math.abs(r1-r2) + Math.abs(c1-c2) !== 1) return false;

            isProcessing = true;
            swapCells(r1,c1, r2,c2);
            drawBoard();

            if (hasMatches()) {
                setTimeout(() => processMatchesAndCascade(), 80);
                return true;
            } else {
                swapCells(r1,c1, r2,c2);
                drawBoard();
                isProcessing = false;
                return false;
            }
        }

        function processMatchesAndCascade() {
            let step = () => {
                let removed = removeMatchesAndAddScore();
                if (removed > 0) {
                    applyGravityAndRefill();
                    drawBoard();
                    setTimeout(step, 100);
                } else {
                    if (!hasValidMoves()) {
                        setTimeout(() => {
                            shuffleBoard();
                            isProcessing = false;
                        }, 200);
                    } else {
                        isProcessing = false;
                    }
                    selectedRow = -1; selectedCol = -1;
                    drawBoard();
                }
            };
            step();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let x = c * TILE_SIZE;
                    let y = r * TILE_SIZE;
                    let type = board[r][c];
                    ctx.fillStyle = COLORS[type % COLORS.length];
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    ctx.strokeStyle = "#b87c4f";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    if (selectedRow === r && selectedCol === c) {
                        ctx.save();
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = "#ffcc44";
                        ctx.strokeStyle = "#ffaa33";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x+2, y+2, TILE_SIZE-5, TILE_SIZE-5);
                        ctx.restore();
                    }
                    ctx.font = `${Math.floor(TILE_SIZE * 0.7)}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#fff3e0";
                    ctx.shadowBlur = 2;
                    ctx.fillText(EMOJIS[type % EMOJIS.length], x + TILE_SIZE/2, y + TILE_SIZE/2);
                }
            }
            ctx.shadowBlur = 0;
        }

        function getTileFromClick(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasY < 0) return null;
            let col = Math.floor(canvasX / TILE_SIZE);
            let row = Math.floor(canvasY / TILE_SIZE);
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) return { row, col };
            return null;
        }

        function handleCanvasClick(e) {
            if (isProcessing) return;
            e.preventDefault();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let tile = getTileFromClick(clientX, clientY);
            if (!tile) return;
            const { row, col } = tile;
            if (selectedRow === -1) {
                selectedRow = row;
                selectedCol = col;
                drawBoard();
            } else {
                let r1 = selectedRow, c1 = selectedCol;
                let r2 = row, c2 = col;
                if ((Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1) {
                    trySwap(r1, c1, r2, c2);
                }
                selectedRow = -1;
                selectedCol = -1;
                drawBoard();
            }
        }

        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
        }

        function manualShuffle() {
            if (isProcessing) return;
            isProcessing = true;
            shuffleBoard();
            setTimeout(() => { isProcessing = false; }, 300);
            selectedRow = -1;
            drawBoard();
        }

        function startGame() {
            initBoard();
            score = 0;
            updateScoreUI();
            selectedRow = -1;
            isProcessing = false;
            drawBoard();
            if (!hasValidMoves()) shuffleBoard();
        }

        // ---------- УПРАВЛЕНИЕ МЕНЮ И НАСТРОЙКАМИ ----------
        const mainMenu = document.getElementById('mainMenu');
        const gameContainer = document.getElementById('gameContainer');
        const playBtn = document.getElementById('playBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const menuReturnBtn = document.getElementById('menuReturnBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const musicToggle = document.getElementById('musicToggle');
        const sfxToggle = document.getElementById('sfxToggle');
        const volumeSlider = document.getElementById('volumeSlider');

        function showGame() {
            mainMenu.style.display = 'none';
            gameContainer.classList.add('visible');
            // Если игра ещё не инициализирована, инициируем
            if (!board.length) startGame();
            else drawBoard();
        }

        function showMenu() {
            mainMenu.style.display = 'flex';
            gameContainer.classList.remove('visible');
        }

        playBtn.addEventListener('click', () => {
            if (!isAudioInit) initAudio();
            showGame();
        });
        menuReturnBtn.addEventListener('click', () => showMenu());
        settingsBtn.addEventListener('click', () => {
            if (!isAudioInit) initAudio();
            settingsModal.style.display = 'flex';
        });
        closeSettingsBtn.addEventListener('click', () => settingsModal.style.display = 'none');
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) settingsModal.style.display = 'none';
        });

        musicToggle.addEventListener('change', (e) => setMusicEnabled(e.target.checked));
        sfxToggle.addEventListener('change', (e) => setSfxEnabled(e.target.checked));
        volumeSlider.addEventListener('input', (e) => setMusicVolume(parseFloat(e.target.value)/100));

        document.querySelectorAll('.melody-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.melody);
                if (!isNaN(idx)) setMelody(idx);
            });
        });

        loadAudioSettings();
        setMusicVolume(musicVolume);
        setMusicEnabled(musicEnabled);
        setSfxEnabled(sfxEnabled);

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });
        document.getElementById('shuffleBtn').addEventListener('click', () => manualShuffle());

        // Запуск игры по кнопке, но меню показываем сразу
        mainMenu.style.display = 'flex';
        gameContainer.classList.remove('visible');
        // Инициализация аудио по первому взаимодействию
        function enableAudioOnFirstInteraction() {
            initAudio();
            document.removeEventListener('click', enableAudioOnFirstInteraction);
            document.removeEventListener('touchstart', enableAudioOnFirstInteraction);
        }
        document.addEventListener('click', enableAudioOnFirstInteraction);
        document.addEventListener('touchstart', enableAudioOnFirstInteraction);
    })();
</script>
</body>
</html>
