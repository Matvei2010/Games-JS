<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Космический рейнджер | Аркадный шутер</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #03050b 0%, #0a0f1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
        }

        .game-container {
            padding: 20px;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.45);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #2e3b4e, 0 15px 25px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 10px;
            padding: 8px 20px;
            background: #0b0e17cc;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            border: 1px solid #2c3f55;
            color: #bbf0ff;
            text-shadow: 0 0 5px #00a6ff;
            font-weight: bold;
        }

        .score-box, .lives-box {
            background: #01010180;
            padding: 6px 18px;
            border-radius: 32px;
            font-size: 1.7rem;
            letter-spacing: 2px;
            backdrop-filter: blur(2px);
        }

        .score-box span, .lives-box span {
            color: #f5c542;
            font-size: 1.9rem;
            font-weight: bold;
            margin-right: 8px;
        }

        .restart-btn {
            background: #1f2a3e;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #e0f2fe;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #0a0e14;
        }

        .restart-btn:hover {
            background: #2f3d5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #0a0e14;
        }

        .controls-hint {
            margin-top: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: #7f8c9a;
            background: #00000055;
            padding: 5px 12px;
            border-radius: 50px;
            display: inline-block;
            width: auto;
        }

        @media (max-width: 860px) {
            .score-box, .lives-box { font-size: 1.2rem; padding: 3px 12px;}
            .score-box span, .lives-box span { font-size: 1.4rem;}
            .restart-btn { font-size: 1rem;}
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>⚡</span> <span id="scoreValue">0</span></div>
            <div class="lives-box"><span>🛸</span> <span id="livesValue">3</span></div>
            <button class="restart-btn" id="restartButton">🔄 РЕСТАРТ</button>
        </div>
        <div class="controls-hint">
            🎮  [← →] или [A / D] — движение | [ПРОБЕЛ] или [ЛКМ] — стрельба плазмой
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- CANVAS --------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // -------- ИГРОВЫЕ РАЗМЕРЫ --------
        const W = 900, H = 650;
        
        // -------- НАСТРОЙКИ ИГРОКА --------
        const PLAYER_WIDTH = 44;
        const PLAYER_HEIGHT = 38;
        const PLAYER_BASE_SPEED = 7.2;
        
        // -------- ФИЗИКА СНАРЯДОВ --------
        const BULLET_SIZE = 8;
        const BULLET_SPEED = -7.8;
        const ENEMY_BULLET_SPEED = 5.2;
        
        // -------- ВРАГИ --------
        const ENEMY_WIDTH = 42;
        const ENEMY_HEIGHT = 36;
        const ENEMY_BASE_SPEED = 1.85;
        
        // -------- ИГРОВЫЕ СОСТОЯНИЯ --------
        let player = {
            x: W/2 - PLAYER_WIDTH/2,
            y: H - 70,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            hp: 3,
            invincibleFrames: 0,    // кадры неуязвимости после попадания
            shootCooldown: 0
        };
        
        let bullets = [];          // пули игрока {x,y, w,h}
        let enemyBullets = [];     // пули врагов
        let enemies = [];
        
        let score = 0;
        let gameOver = false;
        let animationId = null;
        
        // Флаги управления
        let leftPressed = false;
        let rightPressed = false;
        let shootPressed = false;
        
        // Таймеры спавна
        let enemySpawnCounter = 0;
        let enemySpawnDelay = 28;    // кадры между спавнами (будет динамически уменьшаться)
        
        // Доп. эффекты и отрисовка
        let explosionParticles = [];
        let screenShake = 0;
        
        // -------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ --------
        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }
        
        // Обновить отображение UI
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('livesValue').innerText = player.hp;
        }
        
        // Создать частицы взрыва (эффект)
        function addExplosion(px, py, colorType = 'enemy') {
            const count = 12 + Math.floor(Math.random() * 8);
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.8 + Math.random() * 3.5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const life = 0.6 + Math.random() * 0.7;
                const size = 3 + Math.random() * 6;
                let color = colorType === 'enemy' ? '#ff7840' : '#ffcc44';
                if(colorType === 'player') color = '#ff3366';
                explosionParticles.push({
                    x: px, y: py, vx: vx, vy: vy,
                    life: life, maxLife: life, size: size,
                    color: color
                });
            }
            // легкая тряска камеры
            screenShake = 6;
        }
        
        // Обновление частиц
        function updateParticles() {
            for(let i=0; i<explosionParticles.length; i++) {
                const p = explosionParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                if(p.life <= 0 || p.y > H+50 || p.x < -50 || p.x > W+50) {
                    explosionParticles.splice(i,1);
                    i--;
                }
            }
            if(screenShake > 0) screenShake -= 0.8;
            else screenShake = 0;
        }
        
        // -------- ЛОГИКА ИГРОКА --------
        function updatePlayer() {
            if(gameOver) return;
            
            // движение
            if(leftPressed && player.x > 10) {
                player.x -= PLAYER_BASE_SPEED;
            }
            if(rightPressed && player.x + PLAYER_WIDTH < W - 10) {
                player.x += PLAYER_BASE_SPEED;
            }
            player.x = clamp(player.x, 8, W - PLAYER_WIDTH - 8);
            
            // обновление неуязвимости
            if(player.invincibleFrames > 0) {
                player.invincibleFrames--;
            }
            
            // перезарядка выстрелов
            if(player.shootCooldown > 0) player.shootCooldown--;
            
            // стрельба (пробел / ЛКМ)
            if(shootPressed && !gameOver && player.shootCooldown === 0) {
                bullets.push({
                    x: player.x + PLAYER_WIDTH/2 - BULLET_SIZE/2,
                    y: player.y - 12,
                    w: BULLET_SIZE,
                    h: 14,
                    damage: 1
                });
                player.shootCooldown = 12;  // задержка между выстрелами (комфортная)
                // легкий звуковой эффект "визуальный" - мигание
            }
        }
        
        // -------- ВРАГИ: спавн и поведение --------
        function spawnEnemy() {
            let variant = Math.floor(Math.random() * 3);
            let enemyType = variant; // 0,1,2 для разнообразия цвета и здоровья
            let hp = 1;
            let color = '#dc6a42';
            if(enemyType === 1) { color = '#b44cdd'; hp = 2; }   // фиолетовый крепче
            if(enemyType === 2) { color = '#3ea5d4'; hp = 1; }   // синий быстрее?
            
            let speedY = ENEMY_BASE_SPEED + (enemyType === 2 ? 0.65 : 0);
            let speedX = (Math.random() - 0.5) * 1.2;
            
            enemies.push({
                x: Math.random() * (W - ENEMY_WIDTH - 30) + 15,
                y: -ENEMY_HEIGHT,
                width: ENEMY_WIDTH,
                height: ENEMY_HEIGHT,
                hp: hp,
                maxHp: hp,
                type: enemyType,
                color: color,
                speedX: speedX,
                speedY: speedY,
                shootTimer: Math.floor(10 + Math.random() * 40),
                canShoot: true
            });
        }
        
        function updateEnemies() {
            for(let i=0; i<enemies.length; i++) {
                const e = enemies[i];
                e.x += e.speedX;
                e.y += e.speedY;
                
                // границы по X (не вылетают за края полностью)
                e.x = clamp(e.x, 5, W - e.width - 5);
                
                // стрельба врагов (средняя частота)
                if(!gameOver) {
                    if(e.shootTimer <= 0) {
                        // враг стреляет
                        enemyBullets.push({
                            x: e.x + e.width/2 - 4,
                            y: e.y + e.height/2,
                            w: 7,
                            h: 12,
                            damage: 1
                        });
                        e.shootTimer = 55 + Math.floor(Math.random() * 35);
                    } else {
                        e.shootTimer--;
                    }
                }
                
                // удаление врагов за пределами (снизу или сверху сильно)
                if(e.y + e.height > H + 100 || e.y + e.height < -150) {
                    enemies.splice(i,1);
                    i--;
                    continue;
                }
                
                // коллизия с игроком (если не game over и не неуязвимость)
                if(!gameOver && player.invincibleFrames === 0) {
                    if( e.x < player.x+player.width && e.x+e.width > player.x &&
                        e.y < player.y+player.height && e.y+e.height > player.y ) {
                        // столкновение с врагом
                        player.hp -= 1;
                        if(player.hp <= 0) {
                            player.hp = 0;
                            gameOver = true;
                            addExplosion(player.x+player.width/2, player.y+player.height/2, 'player');
                        } else {
                            player.invincibleFrames = 45;   // около 0.75 сек при 60fps
                            addExplosion(e.x+e.width/2, e.y+e.height/2, 'enemy');
                        }
                        // удаляем врага после тарана
                        enemies.splice(i,1);
                        i--;
                        updateUI();
                        continue;
                    }
                }
                
                // коллизия с пулями игрока (только если игра активна)
                if(!gameOver) {
                    for(let j=0; j<bullets.length; j++) {
                        const b = bullets[j];
                        if(b.x < e.x+e.width && b.x+b.w > e.x &&
                           b.y < e.y+e.height && b.y+b.h > e.y) {
                            // попали!
                            bullets.splice(j,1);
                            e.hp -= 1;
                            if(e.hp <= 0) {
                                // начисление очков в зависимости от типа врага
                                let addScore = (e.type === 1) ? 30 : (e.type === 2 ? 20 : 15);
                                score += addScore;
                                updateUI();
                                addExplosion(e.x+e.width/2, e.y+e.height/2, 'enemy');
                                enemies.splice(i,1);
                                i--;
                            } else {
                                // частицы попадания (маленькая вспышка)
                                for(let p=0;p<5;p++) explosionParticles.push({
                                    x: b.x+b.w/2, y: b.y+b.h/2, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
                                    life: 0.3, maxLife: 0.3, size: 3, color: '#ffaa55'
                                });
                            }
                            break;
                        }
                    }
                }
            }
        }
        
        // -------- ПУЛИ ИГРОКА И ВРАГОВ --------
        function updateBullets() {
            // пули игрока
            for(let i=0; i<bullets.length; i++) {
                bullets[i].y += BULLET_SPEED;
                if(bullets[i].y + bullets[i].h < 0 || bullets[i].y > H) {
                    bullets.splice(i,1);
                    i--;
                }
            }
            // пули врагов
            for(let i=0; i<enemyBullets.length; i++) {
                const eb = enemyBullets[i];
                eb.y += ENEMY_BULLET_SPEED;
                if(eb.y + eb.h < 0 || eb.y > H) {
                    enemyBullets.splice(i,1);
                    i--;
                    continue;
                }
                // коллизия с игроком
                if(!gameOver && player.invincibleFrames === 0) {
                    if(eb.x < player.x+player.width && eb.x+eb.w > player.x &&
                       eb.y < player.y+player.height && eb.y+eb.h > player.y) {
                        player.hp -= 1;
                        enemyBullets.splice(i,1);
                        if(player.hp <= 0) {
                            player.hp = 0;
                            gameOver = true;
                            addExplosion(player.x+player.width/2, player.y+player.height/2, 'player');
                        } else {
                            player.invincibleFrames = 40;
                            addExplosion(player.x+player.width/2, player.y+player.height/2, 'player');
                        }
                        updateUI();
                        i--;
                    }
                }
            }
        }
        
        // -------- СПАВН ВРАГОВ (сложность нарастает от счета) --------
        function updateSpawning() {
            if(gameOver) return;
            // динамическая сложность: чем больше очков, тем чаще враги
            let dynamicDelay = Math.max(16, 35 - Math.floor(score / 280));
            if(enemySpawnCounter <= 0) {
                spawnEnemy();
                // шанс спавна двойного врага при высоком счете
                if(score > 600 && Math.random() < 0.35) {
                    spawnEnemy();
                }
                enemySpawnCounter = dynamicDelay;
            } else {
                enemySpawnCounter--;
            }
        }
        
        // -------- СБРОС ИГРЫ --------
        function restartGame() {
            gameOver = false;
            score = 0;
            player.hp = 3;
            player.x = W/2 - PLAYER_WIDTH/2;
            player.y = H - 70;
            player.invincibleFrames = 0;
            player.shootCooldown = 0;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            explosionParticles = [];
            screenShake = 0;
            enemySpawnCounter = 8;
            updateUI();
            leftPressed = false;
            rightPressed = false;
            shootPressed = false;
        }
        
        // -------- ОТРИСОВКА ВСЕГО (графика средней тяжести, стильная) --------
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // Звездное поле (динамическое мерцание)
            ctx.fillStyle = "#020617";
            ctx.fillRect(0, 0, W, H);
            for(let i=0; i<250; i++) {
                if(i%2 === 0) continue; // ленивая звездная псевдо-генерация
                let sx = (i * 131) % W;
                let sy = (i * 253) % H;
                let bright = 0.4 + Math.sin(Date.now() * 0.002 + i) * 0.3;
                ctx.fillStyle = `rgba(255,240,200,${bright*0.7})`;
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }
            
            // ----- ИГРОК (космический истребитель)-----
            if(!gameOver || (gameOver && player.hp > 0)) {
                // эффект мигания при неуязвимости
                let drawPlayer = true;
                if(player.invincibleFrames > 0 && (Math.floor(Date.now()/50) % 3 === 0)) {
                    drawPlayer = false;
                }
                if(drawPlayer) {
                    ctx.save();
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "#0af";
                    // корпус
                    ctx.fillStyle = "#7ec8ff";
                    ctx.beginPath();
                    ctx.roundRect(player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT, 12);
                    ctx.fill();
                    ctx.fillStyle = "#ffb347";
                    ctx.beginPath();
                    ctx.moveTo(player.x+PLAYER_WIDTH/2, player.y-10);
                    ctx.lineTo(player.x+PLAYER_WIDTH/2-8, player.y+8);
                    ctx.lineTo(player.x+PLAYER_WIDTH/2+8, player.y+8);
                    ctx.fill();
                    ctx.fillStyle = "#2c3e66";
                    ctx.beginPath();
                    ctx.roundRect(player.x+8, player.y+12, 8, 12, 4);
                    ctx.roundRect(player.x+PLAYER_WIDTH-16, player.y+12, 8, 12, 4);
                    ctx.fill();
                    ctx.fillStyle = "#ff4444";
                    ctx.beginPath();
                    ctx.arc(player.x+PLAYER_WIDTH/2, player.y+PLAYER_HEIGHT-8, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            // ----- ВРАГИ (разнообразие)-----
            for(let e of enemies) {
                ctx.save();
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#f0a";
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.roundRect(e.x, e.y, e.width, e.height, 12);
                ctx.fill();
                ctx.fillStyle = "#fff3b0";
                ctx.beginPath();
                ctx.ellipse(e.x+e.width-10, e.y+12, 6, 5, 0, 0, Math.PI*2);
                ctx.ellipse(e.x+10, e.y+12, 6, 5, 0, 0, Math.PI*2);
                ctx.fill();
                if(e.hp > 1) {
                    ctx.fillStyle = "#ffdd88";
                    ctx.font = "bold 14 monospace";
                    ctx.shadowBlur = 2;
                    ctx.fillText("🛡️"+e.hp, e.x+12, e.y+28);
                }
                ctx.restore();
            }
            
            // ----- ПУЛИ ИГРОКА (плазма)-----
            for(let b of bullets) {
                ctx.fillStyle = "#f0f05e";
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.w, b.h, 4);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.roundRect(b.x+2, b.y+2, b.w-4, b.h-4, 3);
                ctx.fill();
            }
            
            // ----- ПУЛИ ВРАГОВ (токсичные)-----
            for(let eb of enemyBullets) {
                ctx.fillStyle = "#ff5588";
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.rect(eb.x, eb.y, eb.w, eb.h);
                ctx.fill();
                ctx.fillStyle = "#ffaa99";
                ctx.beginPath();
                ctx.rect(eb.x+2, eb.y+2, eb.w-4, eb.h-4);
                ctx.fill();
            }
            
            // ----- ЧАСТИЦЫ (взрывы/искры)-----
            for(let p of explosionParticles) {
                ctx.globalAlpha = Math.min(1, p.life / p.maxLife * 0.9);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
            
            // ----- ИНТЕРФЕЙС НА КАНВАСЕ-----
            if(gameOver) {
                ctx.font = "bold 44 monospace";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ff3366";
                ctx.shadowColor = "#aa1122";
                ctx.fillText("GAME OVER", W/2-150, H/2-60);
                ctx.font = "26px monospace";
                ctx.fillStyle = "#aaf0ff";
                ctx.fillText("нажми [РЕСТАРТ]", W/2-135, H/2+30);
            }
            
            // эффект тряски
            if(screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }
            
            // небольшая индикация сложности
            ctx.font = "12px monospace";
            ctx.fillStyle = "#6e85b5";
            ctx.fillText("⚡ сложность ▲ " + Math.floor(score/100), 20, 40);
        }
        
        // polyfill для roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // -------- ОСНОВНОЙ ИГРОВОЙ ЦИКЛ --------
        function gameUpdate() {
            if(!gameOver) {
                updatePlayer();
                updateEnemies();
                updateBullets();
                updateSpawning();
                updateParticles();
                // Проверка смерти после обновлений
                if(player.hp <= 0) {
                    gameOver = true;
                }
                updateUI();
            } else {
                // если игра закончена, просто обновляем частицы для красоты
                updateParticles();
            }
            draw();
            animationId = requestAnimationFrame(gameUpdate);
        }
        
        // -------- УПРАВЛЕНИЕ С КЛАВИАТУРЫ И МЫШИ (ЛКМ стрельба) --------
        function handleKeyDown(e) {
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = true;
            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = true;
            if(e.key === ' ' || e.key === 'Space') {
                shootPressed = true;
                e.preventDefault();
            }
            // предотвращаем скролл
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
        }
        
        function handleKeyUp(e) {
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') leftPressed = false;
            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightPressed = false;
            if(e.key === ' ' || e.key === 'Space') {
                shootPressed = false;
                e.preventDefault();
            }
        }
        
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let mouseX = (e.clientX - rect.left) * scaleX;
            if(!gameOver) {
                let newX = mouseX - PLAYER_WIDTH/2;
                newX = clamp(newX, 8, W - PLAYER_WIDTH - 8);
                player.x = newX;
            }
        }
        
        function handleMouseDown(e) {
            if(e.button === 0) {
                shootPressed = true;
                e.preventDefault();
            }
        }
        
        function handleMouseUp(e) {
            if(e.button === 0) shootPressed = false;
        }
        
        function attachEvents() {
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mouseup', handleMouseUp);
            // запрет контекстного меню на канвасе
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        // -------- СТАРТ --------
        function init() {
            restartGame();
            attachEvents();
            gameUpdate();
        }
        
        document.getElementById('restartButton').addEventListener('click', () => {
            restartGame();
        });
        
        init();
    })();
</script>
</body>
</html>
