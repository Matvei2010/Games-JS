<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-нолики — ИИ с выбором сложности</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a3c2c, #0e2a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* общий контейнер */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 550px;
        }

        /* панель главного меню */
        .menu-panel {
            background: #2c2b26;
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        .game-panel {
            background: #2c2b26;
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        h1 {
            color: #ffd966;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            color: #ffdd99;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* кнопки в меню */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .difficulty-btn {
            background: #3a2a1e;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: #ffefc0;
            border: none;
            box-shadow: 0 3px 0 #5a3a2a;
        }

        .difficulty-btn.active {
            background: #ff8844;
            color: white;
            box-shadow: 0 0 8px #ffaa44;
            transform: translateY(-1px);
        }

        .difficulty-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #5a3a2a;
        }

        .start-btn {
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 5px 0 #aa5533;
            margin-top: 15px;
        }

        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        .menu-btn {
            background: #4a3729;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            color: #ffefc0;
            margin-top: 10px;
        }

        /* игровое поле */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            background: #4a3729;
            padding: 12px;
            border-radius: 32px;
            margin-bottom: 20px;
        }

        .cell {
            background: #f9e7b3;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #aa8c5e;
            transform: translateY(-2px);
        }

        .cell:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa8c5e;
        }

        .cell.x {
            color: #e76f51;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .cell.o {
            color: #2a9d8f;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 12px 24px;
            color: #ffefc0;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            background: #2e2b22;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .score {
            display: flex;
            gap: 20px;
        }

        .score div {
            background: #2e2b22;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 18px;
        }

        .score span {
            font-weight: bold;
            color: #ffaa66;
            font-size: 24px;
            margin-left: 8px;
        }

        button {
            background: linear-gradient(145deg, #ffaa55, #ff8844);
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            text-shadow: 0 1px 2px black;
            box-shadow: 0 5px 0 #aa5533;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #aa5533;
        }

        @media (max-width: 500px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 8px;
            }
            .cell {
                font-size: 48px;
            }
            .status {
                font-size: 16px;
                padding: 6px 16px;
            }
            button {
                padding: 6px 20px;
                font-size: 16px;
            }
            .score div {
                font-size: 14px;
                padding: 3px 12px;
            }
            .score span {
                font-size: 20px;
            }
            .difficulty-btn {
                font-size: 14px;
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- МЕНЮ -->
    <div id="menuPanel" class="menu-panel">
        <h1>⚡ Крестики-нолики ⚡</h1>
        <h2>Выбери сложность ИИ</h2>
        <div class="difficulty-buttons">
            <button data-diff="easy" class="difficulty-btn">🍃 Лёгкий</button>
            <button data-diff="medium" class="difficulty-btn active">⚡ Средний</button>
            <button data-diff="hard" class="difficulty-btn">🔥 Сложный</button>
        </div>
        <button id="startGameBtn" class="start-btn">🎮 ИГРАТЬ</button>
        <div style="margin-top: 20px; font-size: 14px; color: #ccaa77;">🎯 Сложный — идеальная игра | Средний — иногда ошибается | Лёгкий — случайные ходы</div>
    </div>

    <!-- ИГРОВАЯ ОБЛАСТЬ (изначально скрыта) -->
    <div id="gamePanel" class="game-panel hidden">
        <div class="board" id="board"></div>
        <div class="info-panel">
            <div class="status" id="status">Ваш ход (X)</div>
            <div class="score">
                <div>🏆 Вы: <span id="playerScore">0</span></div>
                <div>🤖 ИИ: <span id="aiScore">0</span></div>
                <div>🤝 Ничьи: <span id="drawScore">0</span></div>
            </div>
            <button id="menuReturnBtn">🏠 Меню</button>
            <button id="resetGameBtn">🔄 Заново</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- СОСТОЯНИЕ ----------
        let board = [
            ['', '', ''],
            ['', '', ''],
            ['', '', '']
        ];
        let currentPlayer = 'X';   // X всегда игрок, O - ИИ
        let gameActive = true;
        let playerScore = 0;
        let aiScore = 0;
        let drawScore = 0;
        
        let difficulty = 'medium';   // 'easy', 'medium', 'hard'
        
        // DOM элементы
        const menuPanel = document.getElementById('menuPanel');
        const gamePanel = document.getElementById('gamePanel');
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const playerScoreSpan = document.getElementById('playerScore');
        const aiScoreSpan = document.getElementById('aiScore');
        const drawScoreSpan = document.getElementById('drawScore');
        const startGameBtn = document.getElementById('startGameBtn');
        const menuReturnBtn = document.getElementById('menuReturnBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');
        
        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function renderBoard() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (board[i][j] === 'X') cell.classList.add('x');
                    if (board[i][j] === 'O') cell.classList.add('o');
                    cell.textContent = board[i][j] === 'X' ? '❌' : (board[i][j] === 'O' ? '⭕' : '');
                    cell.addEventListener('click', (function(row, col) {
                        return function() { handlePlayerMove(row, col); };
                    })(i, j));
                    boardElement.appendChild(cell);
                }
            }
        }
        
        function checkWinner(boardState) {
            const winPatterns = [
                [[0,0],[0,1],[0,2]],
                [[1,0],[1,1],[1,2]],
                [[2,0],[2,1],[2,2]],
                [[0,0],[1,0],[2,0]],
                [[0,1],[1,1],[2,1]],
                [[0,2],[1,2],[2,2]],
                [[0,0],[1,1],[2,2]],
                [[0,2],[1,1],[2,0]]
            ];
            for (let pattern of winPatterns) {
                const [a,b,c] = pattern;
                const val = boardState[a[0]][a[1]];
                if (val && val === boardState[b[0]][b[1]] && val === boardState[c[0]][c[1]]) {
                    return val;
                }
            }
            return null;
        }
        
        function isDraw(boardState) {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (boardState[i][j] === '') return false;
                }
            }
            return true;
        }
        
        function updateGameStatus(winner) {
            if (winner === 'X') {
                statusElement.textContent = '🎉 Вы победили! 🎉';
                playerScore++;
                playerScoreSpan.textContent = playerScore;
                gameActive = false;
            } else if (winner === 'O') {
                statusElement.textContent = '🤖 ИИ победил! 🤖';
                aiScore++;
                aiScoreSpan.textContent = aiScore;
                gameActive = false;
            } else if (isDraw(board)) {
                statusElement.textContent = '🤝 Ничья! 🤝';
                drawScore++;
                drawScoreSpan.textContent = drawScore;
                gameActive = false;
            } else {
                statusElement.textContent = currentPlayer === 'X' ? 'Ваш ход (X)' : 'Ход ИИ (O)...';
            }
        }
        
        function endTurn(winner) {
            updateGameStatus(winner);
            renderBoard();
            if (gameActive && currentPlayer === 'O') {
                setTimeout(() => aiMove(), 200);
            }
        }
        
        function handlePlayerMove(row, col) {
            if (!gameActive) return;
            if (currentPlayer !== 'X') return;
            if (board[row][col] !== '') return;
            
            board[row][col] = 'X';
            renderBoard();
            
            const winner = checkWinner(board);
            if (winner || isDraw(board)) {
                gameActive = false;
                endTurn(winner);
                return;
            }
            
            currentPlayer = 'O';
            endTurn(null);
        }
        
        // ---------- AI С РАЗНОЙ СЛОЖНОСТЬЮ ----------
        // Минимакс (идеальная игра)
        function minimax(boardState, depth, isMaximizing, alpha, beta) {
            const winner = checkWinner(boardState);
            if (winner === 'X') return -10 + depth;
            if (winner === 'O') return 10 - depth;
            if (isDraw(boardState)) return 0;
            
            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (boardState[i][j] === '') {
                            boardState[i][j] = 'O';
                            let eval = minimax(boardState, depth + 1, false, alpha, beta);
                            boardState[i][j] = '';
                            maxEval = Math.max(maxEval, eval);
                            alpha = Math.max(alpha, eval);
                            if (beta <= alpha) break;
                        }
                    }
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (boardState[i][j] === '') {
                            boardState[i][j] = 'X';
                            let eval = minimax(boardState, depth + 1, true, alpha, beta);
                            boardState[i][j] = '';
                            minEval = Math.min(minEval, eval);
                            beta = Math.min(beta, eval);
                            if (beta <= alpha) break;
                        }
                    }
                }
                return minEval;
            }
        }
        
        function getBestMoveHard() {
            let bestScore = -Infinity;
            let bestMove = null;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i][j] === '') {
                        board[i][j] = 'O';
                        let score = minimax(board, 0, false, -Infinity, Infinity);
                        board[i][j] = '';
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = { row: i, col: j };
                        }
                    }
                }
            }
            return bestMove;
        }
        
        // Случайный ход (для лёгкого уровня)
        function getRandomMove() {
            let empty = [];
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i][j] === '') empty.push({ row: i, col: j });
                }
            }
            if (empty.length === 0) return null;
            return empty[Math.floor(Math.random() * empty.length)];
        }
        
        // Средний уровень: с вероятностью 40% ходит случайно, иначе оптимально
        function getMediumMove() {
            if (Math.random() < 0.4) {
                return getRandomMove();
            } else {
                return getBestMoveHard();
            }
        }
        
        function aiMove() {
            if (!gameActive) return;
            if (currentPlayer !== 'O') return;
            
            let move = null;
            if (difficulty === 'easy') {
                move = getRandomMove();
            } else if (difficulty === 'medium') {
                move = getMediumMove();
            } else { // hard
                move = getBestMoveHard();
            }
            
            if (move) {
                board[move.row][move.col] = 'O';
                renderBoard();
                
                const winner = checkWinner(board);
                if (winner || isDraw(board)) {
                    gameActive = false;
                    endTurn(winner);
                    return;
                }
                
                currentPlayer = 'X';
                endTurn(null);
            } else {
                if (isDraw(board)) {
                    gameActive = false;
                    endTurn(null);
                }
            }
        }
        
        // ---------- УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ ----------
        function resetGameState() {
            board = [
                ['', '', ''],
                ['', '', ''],
                ['', '', '']
            ];
            currentPlayer = 'X';
            gameActive = true;
            statusElement.textContent = 'Ваш ход (X)';
            renderBoard();
        }
        
        function resetFullGame() {
            resetGameState();
            // счёт не обнуляем, только доску
        }
        
        function startNewGameWithDifficulty() {
            // сброс доски и активация
            resetGameState();
            // если нужно обнулить счёт? не обнуляем, только если пользователь захочет через меню? лучше оставить накопленный
            gamePanel.classList.remove('hidden');
            menuPanel.classList.add('hidden');
        }
        
        function returnToMenu() {
            gamePanel.classList.add('hidden');
            menuPanel.classList.remove('hidden');
            // сброс игры, чтобы при повторном входе всё было чисто
            resetGameState();
        }
        
        // Обновление отображения счёта (вызывается после каждого очка)
        function updateScoreUI() {
            playerScoreSpan.textContent = playerScore;
            aiScoreSpan.textContent = aiScore;
            drawScoreSpan.textContent = drawScore;
        }
        
        // Переопределяем updateGameStatus, чтобы обновлялся UI счёта
        const originalUpdateGameStatus = updateGameStatus;
        window.updateGameStatus = function(winner) {
            originalUpdateGameStatus(winner);
            updateScoreUI();
        };
        updateGameStatus = function(winner) {
            if (winner === 'X') {
                playerScore++;
                statusElement.textContent = '🎉 Вы победили! 🎉';
                gameActive = false;
            } else if (winner === 'O') {
                aiScore++;
                statusElement.textContent = '🤖 ИИ победил! 🤖';
                gameActive = false;
            } else if (isDraw(board)) {
                drawScore++;
                statusElement.textContent = '🤝 Ничья! 🤝';
                gameActive = false;
            } else {
                statusElement.textContent = currentPlayer === 'X' ? 'Ваш ход (X)' : 'Ход ИИ (O)...';
            }
            updateScoreUI();
        };
        
        // Переопределяем функцию для использования нового updateGameStatus
        function endTurnWithUI(winner) {
            updateGameStatus(winner);
            renderBoard();
            if (gameActive && currentPlayer === 'O') {
                setTimeout(() => aiMove(), 200);
            }
        }
        
        // Замена вызовов endTurn на endTurnWithUI
        window.endTurn = endTurnWithUI;
        
        // Немного подправим handlePlayerMove, чтобы использовать новую endTurn
        function handlePlayerMoveFixed(row, col) {
            if (!gameActive) return;
            if (currentPlayer !== 'X') return;
            if (board[row][col] !== '') return;
            
            board[row][col] = 'X';
            renderBoard();
            
            const winner = checkWinner(board);
            if (winner || isDraw(board)) {
                gameActive = false;
                endTurnWithUI(winner);
                return;
            }
            
            currentPlayer = 'O';
            endTurnWithUI(null);
        }
        
        // Замена глобальной функции
        window.handlePlayerMove = handlePlayerMoveFixed;
        
        // Переназначим слушатели ячеек в renderBoard (используем handlePlayerMoveFixed)
        function renderBoardFixed() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (board[i][j] === 'X') cell.classList.add('x');
                    if (board[i][j] === 'O') cell.classList.add('o');
                    cell.textContent = board[i][j] === 'X' ? '❌' : (board[i][j] === 'O' ? '⭕' : '');
                    cell.addEventListener('click', (function(row, col) {
                        return function() { handlePlayerMoveFixed(row, col); };
                    })(i, j));
                    boardElement.appendChild(cell);
                }
            }
        }
        
        window.renderBoard = renderBoardFixed;
        
        // Инициализация игры (после того, как меню выбрано)
        function initGame() {
            renderBoardFixed();
            updateScoreUI();
            resetGameState();
        }
        
        // ---------- ОБРАБОТЧИКИ ----------
        // Выбор сложности
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.getAttribute('data-diff');
            });
        });
        
        startGameBtn.addEventListener('click', () => {
            // сбросим счёт только если нужно? не сбрасываем, оставляем для сессии
            // но можно сделать сброс счёта по желанию (добавим в меню кнопку сброса статистики)
            playerScore = 0;
            aiScore = 0;
            drawScore = 0;
            updateScoreUI();
            startNewGameWithDifficulty();
            resetGameState();
        });
        
        menuReturnBtn.addEventListener('click', () => {
            returnToMenu();
        });
        
        resetGameBtn.addEventListener('click', () => {
            resetFullGame();
        });
        
        // Инициализация (показываем меню, игра скрыта)
        initGame();
        gamePanel.classList.add('hidden');
        menuPanel.classList.remove('hidden');
        
        // Дополнительно: при клике на "сброс статистики" в меню (можно добавить, но не обязательно)
        // Добавим скрытую кнопку сброса счёта (двойной клик по заголовку)
        const menuTitle = document.querySelector('.menu-panel h1');
        menuTitle.addEventListener('dblclick', () => {
            if (confirm('Сбросить всю статистику (очки игрока и ИИ)?')) {
                playerScore = 0;
                aiScore = 0;
                drawScore = 0;
                updateScoreUI();
                alert('Статистика обнулена');
            }
        });
    })();
</script>
</body>
</html>
