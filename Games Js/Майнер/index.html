<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Idle Miner</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #111; color: #eee; text-align: center; }
        #game { margin: 20px auto; width: 400px; }
        .button { background: #444; border: 2px solid #666; padding: 15px; margin: 10px; cursor: pointer; color: #ff0; font-size: 18px; }
        .button:hover { background: #666; }
        #resource { font-size: 32px; margin-top: 30px; }
    </style>
</head>
<body>

<div id="game">
    <h1>Idle Miner 💎</h1>
    
    <div id="resource">Камни: <span id="stones-count">0</span></div>
    
    <button class="button" id="mine-button">Добывать (+1)</button>
    
    <hr>
    <h2>Автоматизация</h2>
    <div id="miner-info">
        Гномы-шахтёры: <span id="miner-count">0</span> 
        (Производят: <span id="miner-production">0</span> камня/сек)
    </div>
    <button class="button" id="hire-miner">Нанять гнома (10 камней)</button>

    <hr>
    <h2>Улучшения</h2>
    <div id="upgrade-info">
        Улучшение кирки: Уровень <span id="pickaxe-level">0</span> 
        (Цена: <span id="pickaxe-cost">10</span> камней)
    </div>
    <button class="button" id="buy-pickaxe">Купить улучшение</button>

</div>

<script src="game.js"></script>
</body>
</html>
